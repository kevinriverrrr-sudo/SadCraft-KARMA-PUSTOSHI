# Конфигурация SadWarps

# Стоимость создания варпа (0 = бесплатно)
warp_cost: 500

# Стоимость установки дома (0 = бесплатно)
home_cost: 100

# Максимум домов на игрока
max_homes: 3

# Задержка телепорта (секунды, 0 = мгновенно)
teleport_delay: 3

# Отмена телепорта при движении
cancel_on_move: true

# Кулдаун телепорта (секунды)
teleport_cooldown: 30
