# Сообщения
messages:
  npc_kill: "[NPC] Ты убил {name}! Награда: {scrap}S, Карма: +{karma}"
  npc_kill_broadcast: "[NPC] {player} убил {name} тира {tier}!"
  loot_drop: "[NPC] Лут: {items}"
